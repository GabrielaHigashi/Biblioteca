<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>LibraControl - Login</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 380px;
            text-align: center;
        }

        .login-card img {
            width: 150px;
            margin-bottom: 20px;
        }

        .login-card h2 {
            color: #333;
            margin-bottom: 25px;
            font-size: 20px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border 0.3s;
        }

        .input-group input:focus {
            border-color: #4A90E2;
        }

        .btn-entrar {
            width: 100%;
            background-color: #2D4A85;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn-entrar:hover {
            background-color: #1e335a;
        }

        .alert {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .alert-danger {
            background-color: #ffe6e6;
            color: #cc0000;
        }

        .alert-success {
            background-color: #e6ffed;
            color: #28a745;
        }

        .link-cadastro {
            display: block;
            margin-top: 20px;
            color: #4A90E2;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <img th:src="@{/images/LibraControl.png}" alt="Logo LibraControl">
        <h2>Acesso ao Sistema</h2>

        <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>
        <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>

        <form th:action="@{/login-bibliotecario}" method="POST">
            <div class="input-group">
                <label>Registro (CPF)</label>
                <input type="text" name="registro" placeholder="Digite seu registro" required>
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" name="senha" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="btn-entrar">Entrar</button>
        </form>

        <a th:href="@{/cadastro-usuario}" class="link-cadastro">Não tem uma conta? Cadastre-se</a>
    </div>

</body>

</html>
